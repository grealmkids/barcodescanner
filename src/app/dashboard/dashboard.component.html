      <img src="snapteclogo.jpeg" alt="Snaptec Logo" class="img-fluid me-2" style="max-height: 40px; object-fit: contain;">

    </a>

<div class="container py-5 px-3">
  <div class="row justify-content-center animate-fade">
    <div class="col-12 col-md-10 col-lg-8" style="max-width: 700px;">
      
      <div class="card card-premium p-4 p-md-5">
        <h1 class="h3 heading-grey mb-4 text-center">Barcode Generator</h1>
        
        <form (ngSubmit)="generateBarcode()" #barcodeForm="ngForm">
          <!-- Barcode Name Input -->
          <div class="mb-4">
            <label for="barcodeName" class="form-label small text-uppercase text-muted fw-bold">Barcode Name <span class="text-lowercase text-muted fw-normal">(optional)</span></label>
            <input 
              type="text" 
              id="barcodeName" 
              name="barcodeName" 
              class="form-control form-control-premium" 
              placeholder="e.g. Warehouse Box 01" 
              [(ngModel)]="barcodeName"
              maxlength="50"
              [class.is-invalid]="nameError">
            <div *ngIf="nameError" class="invalid-feedback animate-fade">
              <i class="bi bi-exclamation-circle me-1"></i> {{ nameError }}
            </div>
            <div class="form-text text-muted small" style="font-size: 0.8rem;">
              Only letters, numbers, spaces, hyphens, and underscores are allowed. Max 50 chars.
            </div>
          </div>

          <!-- Barcode Number Input -->
          <div class="mb-4">
            <label for="barcodeNumber" class="form-label small text-uppercase text-muted fw-bold">Barcode Number <span class="text-danger">*</span></label>
            <input 
              type="text" 
              id="barcodeNumber" 
              name="barcodeNumber" 
              class="form-control form-control-premium" 
              placeholder="e.g. 0012345678" 
              [(ngModel)]="barcodeNumber"
              required
              inputmode="numeric"
              maxlength="10"
              autocomplete="off"
              [class.is-invalid]="numberError">
            <div *ngIf="numberError" class="invalid-feedback animate-fade">
              <i class="bi bi-exclamation-circle me-1"></i> {{ numberError }}
            </div>
            <div class="form-text text-muted small" style="font-size: 0.8rem;">
              Required. Exactly 10 digits (0-9). No spaces, letters, or symbols allowed.
            </div>
          </div>

          <!-- Collapsible Settings Panel -->
          <div class="mb-4">
            <button 
              type="button" 
              class="btn btn-link p-0 text-decoration-none text-dark fw-bold small text-uppercase d-flex align-items-center" 
              (click)="showSettings = !showSettings"
              style="font-size: 0.8rem;">
              <i class="bi" [class.bi-chevron-down]="showSettings" [class.bi-chevron-right]="!showSettings"></i>
              <span class="ms-2">Appearance Settings</span>
            </button>
            
            <div *ngIf="showSettings" class="row g-3 mt-2 p-3 bg-light rounded-3 border animate-fade">
              <!-- Barcode Standard -->
              <div class="col-12 col-md-6">
                <label for="configFormat" class="form-label small text-muted text-uppercase fw-bold mb-1" style="font-size: 0.75rem;">Barcode Standard</label>
                <select 
                  id="configFormat" 
                  name="configFormat" 
                  class="form-select form-select-sm form-control-premium py-2" 
                  [(ngModel)]="barcodeConfig.format"
                  (ngModelChange)="onConfigChange()">
                  <option value="CODE39">Code 39 (Client Standard - ~60 bars)</option>
                  <option value="CODE128">Code 128 (Auto/Compact)</option>
                  <option value="CODE128B">Code 128 Mode B (Wider)</option>
                </select>
              </div>

              <!-- Bar Width -->
              <div class="col-6 col-md-3">
                <label for="configWidth" class="form-label small text-muted text-uppercase fw-bold mb-1" style="font-size: 0.75rem;">Bar Width</label>
                <select 
                  id="configWidth" 
                  name="configWidth" 
                  class="form-select form-select-sm form-control-premium py-2" 
                  [(ngModel)]="barcodeConfig.width"
                  (ngModelChange)="onConfigChange()">
                  <option [value]="2.4">2.4</option>
                  <option [value]="2.6">2.6</option>
                  <option [value]="2.8">2.8 (Default)</option>
                  <option [value]="3.0">3.0</option>
                  <option [value]="3.2">3.2</option>
                </select>
              </div>

              <!-- Bar Height -->
              <div class="col-6 col-md-3">
                <label for="configHeight" class="form-label small text-muted text-uppercase fw-bold mb-1" style="font-size: 0.75rem;">Bar Height</label>
                <select 
                  id="configHeight" 
                  name="configHeight" 
                  class="form-select form-select-sm form-control-premium py-2" 
                  [(ngModel)]="barcodeConfig.height"
                  (ngModelChange)="onConfigChange()">
                  <option [value]="80">80px</option>
                  <option [value]="95">95px (Default)</option>
                  <option [value]="110">110px</option>
                  <option [value]="120">120px</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Create Button -->
          <button 
            type="submit" 
            class="btn btn-create w-100 py-3 mb-4"
            [disabled]="!isFormValid()">
            <i class="bi bi-qr-code me-2"></i>Create Barcode
          </button>
        </form>

        <!-- Preview and Download Section -->
        <div *ngIf="hasGenerated" class="border-top pt-4 mt-2 animate-fade">
          <h3 class="h6 text-uppercase text-muted fw-bold mb-3 text-center">Preview</h3>
          
          <div class="d-flex justify-content-center p-4 bg-light rounded-3 mb-4 border" style="border-style: dashed !important; border-color: var(--border-color) !important; overflow-x: auto;">
            <!-- Barcode Canvas Target with fixed dimensions and no shrinking -->
            <canvas #barcodeCanvas style="max-width: none; height: auto;"></canvas>
          </div>

          <!-- General error if rendering failed -->
          <div *ngIf="generalError" class="alert alert-danger text-center mb-3 animate-fade" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ generalError }}
          </div>

          <!-- Download Button -->
          <button 
            type="button" 
            class="btn btn-download w-100 py-3" 
            (click)="downloadBarcode()">
            <i class="bi bi-download me-2"></i>Download PNG
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
